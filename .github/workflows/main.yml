name: Magic Auto-Build Launcher APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Kunci Versi Gradle di 8.2 (Fix Error!)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Sulap Kode Otomatis (Membuat File Android)
      run: |
        mkdir -p app/src/main/java/com/tv/launcher
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Download Logo
        wget -O app/src/main/res/mipmap-xxxhdpi/ic_launcher.png "https://cdn-icons-png.flaticon.com/512/833/833281.png"

        # Settings Gradle
        cat << 'EOF' > settings.gradle
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
        rootProject.name = "MyTVLauncher"
        include ':app'
        EOF

        # Project build.gradle
        cat << 'EOF' > build.gradle
        plugins {
            id 'com.android.application' version '8.1.0' apply false
            id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
        }
        EOF

        # App build.gradle (Ditambah config Java 17)
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application'; id 'org.jetbrains.kotlin.android' }
        android {
            namespace 'com.tv.launcher'
            compileSdk 34
            defaultConfig {
                applicationId "com.tv.launcher"
                minSdk 23
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = '17'
            }
        }
        dependencies {
            implementation 'androidx.core:core-ktx:1.12.0'
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
            implementation 'androidx.cardview:cardview:1.0.0'
        }
        EOF

        # AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.SET_WALLPAPER" />
            <application android:icon="@mipmap/ic_launcher" android:label="TV Launcher Pro" android:theme="@style/Theme.MyTVLauncher">
                <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTask" android:stateNotNeeded="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.HOME" />
                        <category android:name="android.intent.category.DEFAULT" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name=".TvActivity" android:exported="false" />
            </application>
        </manifest>
        EOF

        # Tema (Transparan)
        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.MyTVLauncher" parent="Theme.AppCompat.Light.NoActionBar">
                <item name="android:windowBackground">@android:color/transparent</item>
                <item name="android:windowShowWallpaper">true</item>
            </style>
        </resources>
        EOF

        # Layout Utama
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:padding="16dp">
            <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:gravity="center" android:layout_marginTop="20dp" android:layout_marginBottom="20dp">
                <androidx.cardview.widget.CardView android:id="@+id/btnTv" android:layout_width="120dp" android:layout_height="60dp" app:cardBackgroundColor="#E91E63" app:cardCornerRadius="12dp" android:layout_marginEnd="10dp"><TextView android:layout_width="match_parent" android:layout_height="match_parent" android:text="📺 LIVE TV" android:gravity="center" android:textColor="#FFF" android:textStyle="bold"/></androidx.cardview.widget.CardView>
                <androidx.cardview.widget.CardView android:id="@+id/btnWall" android:layout_width="120dp" android:layout_height="60dp" app:cardBackgroundColor="#2196F3" app:cardCornerRadius="12dp" android:layout_marginEnd="10dp"><TextView android:layout_width="match_parent" android:layout_height="match_parent" android:text="🖼️ WALLPAPER" android:gravity="center" android:textColor="#FFF" android:textStyle="bold"/></androidx.cardview.widget.CardView>
                <androidx.cardview.widget.CardView android:id="@+id/btnAddApp" android:layout_width="120dp" android:layout_height="60dp" app:cardBackgroundColor="#4CAF50" app:cardCornerRadius="12dp"><TextView android:layout_width="match_parent" android:layout_height="match_parent" android:text="➕ TAMBAH APP" android:gravity="center" android:textColor="#FFF" android:textStyle="bold"/></androidx.cardview.widget.CardView>
            </LinearLayout>
            <androidx.recyclerview.widget.RecyclerView android:id="@+id/rvApps" android:layout_width="match_parent" android:layout_height="match_parent" />
        </LinearLayout>
        EOF

        # Layout TV
        cat << 'EOF' > app/src/main/res/layout/activity_tv.xml
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
            <VideoView android:id="@+id/videoView" android:layout_width="match_parent" android:layout_height="match_parent" android:layout_centerInParent="true"/>
        </RelativeLayout>
        EOF

        # Kode Utama (MainActivity.kt)
        cat << 'EOF' > app/src/main/java/com/tv/launcher/MainActivity.kt
        package com.tv.launcher
        import android.content.Intent
        import android.graphics.drawable.Drawable
        import android.os.Bundle
        import android.view.*
        import android.widget.*
        import androidx.appcompat.app.AppCompatActivity
        import androidx.recyclerview.widget.GridLayoutManager
        import androidx.recyclerview.widget.RecyclerView
        import android.provider.Settings

        data class AppInfo(val name: String, val pkg: String, val icon: Drawable)

        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_main)

                findViewById<View>(R.id.btnTv).setOnClickListener { startActivity(Intent(this, TvActivity::class.java)) }
                findViewById<View>(R.id.btnWall).setOnClickListener { startActivity(Intent.createChooser(Intent(Intent.ACTION_SET_WALLPAPER), "Pilih Wallpaper")) }
                findViewById<View>(R.id.btnAddApp).setOnClickListener { startActivity(Intent(Settings.ACTION_MANAGE_APPLICATIONS_SETTINGS)) }

                val rv = findViewById<RecyclerView>(R.id.rvApps)
                rv.layoutManager = GridLayoutManager(this, 5)
                rv.adapter = AppAdapter(getApps())
            }

            private fun getApps(): List<AppInfo> {
                val intent = Intent(Intent.ACTION_MAIN, null).apply { addCategory(Intent.CATEGORY_LAUNCHER) }
                return packageManager.queryIntentActivities(intent, 0).mapNotNull {
                    if (it.activityInfo.packageName != packageName) {
                        AppInfo(it.loadLabel(packageManager).toString(), it.activityInfo.packageName, it.activityInfo.loadIcon(packageManager))
                    } else null
                }.sortedBy { it.name }
            }

            inner class AppAdapter(private val apps: List<AppInfo>) : RecyclerView.Adapter<AppAdapter.VH>() {
                inner class VH(v: View) : RecyclerView.ViewHolder(v) {
                    val icon: ImageView = v.findViewById(android.R.id.icon)
                    val text: TextView = v.findViewById(android.R.id.text1)
                }
                override fun onCreateViewHolder(p: ViewGroup, t: Int): VH {
                    val v = LayoutInflater.from(p.context).inflate(android.R.layout.activity_list_item, p, false)
                    v.layoutParams = ViewGroup.LayoutParams(-1, 280)
                    return VH(v)
                }
                override fun onBindViewHolder(h: VH, i: Int) {
                    h.text.text = apps[i].name
                    h.text.setTextColor(android.graphics.Color.WHITE)
                    h.text.gravity = Gravity.CENTER
                    h.text.setSingleLine(true)
                    h.icon.setImageDrawable(apps[i].icon)
                    h.itemView.setOnClickListener { startActivity(packageManager.getLaunchIntentForPackage(apps[i].pkg)) }
                }
                override fun getItemCount() = apps.size
            }
            @Deprecated("Deprecated") override fun onBackPressed() {}
        }
        EOF

        # Kode TV (TvActivity.kt)
        cat << 'EOF' > app/src/main/java/com/tv/launcher/TvActivity.kt
        package com.tv.launcher
        import android.net.Uri
        import android.os.Bundle
        import android.widget.MediaController
        import android.widget.VideoView
        import androidx.appcompat.app.AppCompatActivity

        class TvActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                setContentView(R.layout.activity_tv)
                val vv = findViewById<VideoView>(R.id.videoView)
                vv.setMediaController(MediaController(this).apply { setAnchorView(vv) })
                vv.setVideoURI(Uri.parse("https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8"))
                vv.requestFocus()
                vv.start()
            }
        }
        EOF

    - name: Mulai Merakit APK 🚀
      run: gradle assembleDebug

    - name: Upload APK Launcher (Selesai!)
      uses: actions/upload-artifact@v4
      with:
        name: TV-Launcher-Ajaib-APK
        path: app/build/outputs/apk/debug/app-debug.apk
